<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nav with Dropdown</title>
  <style>
    /* Basic nav reset */
    nav {
      background: #333;
      padding: 0 20px;
    }
    nav ul {
      list-style: none;
      display: flex;
      margin: 0;
      padding: 0;
    }
    nav ul li {
      position: relative;
    }
    nav ul li a {
      display: block;
      padding: 16px 20px;
      color: #fff;
      text-decoration: none;
      font-size: 16px;
      transition: background 0.2s;
    }
    nav ul li a:hover {
      background: #444;
    }

    /* Dropdown trigger link */
    nav ul li.dropdown > a::after {
      content: '▾';
      margin-left: 6px;
      font-size: 12px;
      transition: transform 0.3s;
    }

    /* Dropdown menu */
    nav ul li .dropdown-content {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      background: #fff;
      border-radius: 6px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
      overflow: hidden;
      min-width: 160px;
      z-index: 1000;
    }
    nav ul li .dropdown-content a {
      color: #333;
      padding: 12px 16px;
    }
    nav ul li .dropdown-content a:hover {
      background: #f1f1f1;
    }

    /* Show on hover */
    nav ul li.dropdown:hover .dropdown-content {
      display: block;
    }
    nav ul li.dropdown:hover > a::after {
      transform: rotate(180deg);
    }
  </style>
</head>
<body>

  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li class="dropdown">
        <a href="#">Services</a>
        <div class="dropdown-content">
          <a href="webdesign.html">Web Design</a>
          <a href="hosting.html">Hosting</a>
          <a href="support.html">Support</a>
        </div>
      </li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

</body>
</html>
